name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: 型別檢查 & 建置驗證
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: 安裝依賴
        run: npm ci

      - name: TypeScript 型別檢查
        run: npx tsc --noEmit

      - name: Next.js 建置驗證
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
